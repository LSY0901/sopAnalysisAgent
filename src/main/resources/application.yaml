server:
  port: 9002

spring:
  application:
    name: SopAnalysisAgent
  datasource:
    url: jdbc:postgresql://localhost:5432/agent_db?options=-c%20search_path%3Dagent%2Cpublic
    username: agent_user
    password: 123456
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-ws-H.RPHYXRY.wZxy.MEUCIQCpVBVy1CRj7UVwokFb1tzXI5JtoYx2P0mPRV_UUzIiqwIgaWWMsy4GZ2AzLUthT2lsjFyGS5b_hBv7clmGhFYzS6s
      chat:
        options:
          model: qwen3.7-plus
          temperature: 0.2

# MES / ERP 外部系统端点（占位，接入真实系统时替换）
mes:
  base-url: http://localhost:0
erp:
  base-url: http://localhost:0

# Python RAG 聚合检索服务：对外只暴露 /search 接口
# embedding 与 rerank 由 Python 侧内部完成，Spring AI 不直接调用
rag:
  base-url: http://localhost:8000
  top-k: 5

logging:
  level:
    org.springframework.ai: debug
    org.springframework.ai.openai: DEBUG
    org.springframework.ai.chat.client.advisor: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    mapper-locations: classpath:/mapper/*.xml
